<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度工资计算器（多账户版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 100%;
            margin: 10px auto;
            padding: 10px;
            background: #f5f5f5;
            min-width: 320px;
        }
        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5rem;
        }
        /* 新增账户样式 */
        .account-box {
            border: 1px solid #cce5ff;
            background: #f0f8ff;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .account-label {
            font-weight: bold;
            font-size: 0.95rem;
            flex: 0 0 100%;
            margin-bottom: 8px;
        }
        .account-select {
            flex: 1;
            min-width: 150px;
            padding: 8px 10px;
            font-size: 0.95rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .account-input {
            flex: 1;
            min-width: 120px;
            padding: 8px 10px;
            font-size: 0.95rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .item {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px 10px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            touch-action: manipulation;
        }
        textarea {
            width: 100%;
            padding: 12px 10px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 120px;
            resize: vertical;
            touch-action: manipulation;
        }
        button {
            padding: 12px 20px;
            background: #2d8cf0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
            touch-action: manipulation;
            transition: background 0.2s;
        }
        button:hover {
            background: #1b76d3;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-group button {
            flex: 1;
            min-width: 120px;
            padding: 12px 0;
            margin: 0;
        }
        /* 账户操作按钮样式 */
        .account-btn {
            padding: 8px 12px;
            font-size: 0.9rem;
            min-width: 80px;
            flex: none;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4ff;
            border-radius: 5px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .daily-list {
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .daily-item {
            padding: 10px 8px;
            border-bottom: 1px dashed #eee;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .daily-item > div:first-child {
            order: 1;
        }
        .daily-item > div:nth-child(2) {
            order: 2;
            margin-top: 4px;
        }
        .daily-item button {
            order: 3;
            width: auto;
            align-self: flex-end;
            padding: 4px 10px;
            font-size: 0.85rem;
            margin: 0;
        }
        .daily-item:last-child {
            border-bottom: none;
        }
        .summary {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            font-weight: bold;
            font-size: 1rem;
        }
        .recognize-box {
            border: 1px solid #cce5ff;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        @media screen and (max-width: 375px) {
            h2 {
                font-size: 1.3rem;
            }
            .item {
                margin-bottom: 12px;
            }
            .btn-group {
                gap: 5px;
            }
            .btn-group button {
                min-width: 100px;
                font-size: 0.9rem;
                padding: 10px 0;
            }
            .daily-item {
                padding: 8px 4px;
            }
            .account-box {
                gap: 5px;
            }
            .account-btn {
                min-width: 70px;
                padding: 6px 8px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="box">
    <h2>月度工资计算器（多账户版）</h2>

    <!-- 新增账户管理区域 -->
    <div class="account-box">
        <div class="account-label">账户管理（自动记忆账单）</div>
        <select id="accountSelect" class="account-select">
            <option value="">请选择账户</option>
        </select>
        <input type="text" id="newAccountName" class="account-input" placeholder="输入新账户名称">
        <button class="account-btn" style="background: #52c41a;" onclick="addAccount()">创建账户</button>
        <button class="account-btn" style="background: #ff4d4f;" onclick="deleteAccount()">删除账户</button>
        <button class="account-btn" style="background: #faad14;" onclick="setDefaultAccount()">设为默认</button>
    </div>

    <!-- 新增文本识别区域 -->
    <div class="recognize-box">
        <div class="item">
            <label>批量识别文本（粘贴待解析内容）</label>
            <textarea id="recognizeText" placeholder="请粘贴包含时间、销售金额、退货金额的文本内容..."></textarea>
        </div>
        <div class="item">
            <label>识别后填充的日期（如：5月1日）</label>
            <input type="text" id="recognizeDate" placeholder="请输入对应日期，例：5月1日">
        </div>
        <button onclick="recognizeAndAddRecord()" style="background: #52c41a;">识别文本并添加记录</button>
    </div>

    <div class="item">
        <label>日期（如：5月1日）</label>
        <input type="text" id="date" placeholder="请输入当日日期，例：5月1日">
    </div>

    <div class="item">
        <label>当日总销售金额（元）</label>
        <input type="number" id="total" placeholder="请输入总金额" step="0.01">
    </div>

    <div class="item">
        <label>当日退货金额（元）</label>
        <input type="number" id="back" placeholder="请输入退货金额" step="0.01">
    </div>

    <div class="item">
        <label>当日工作小时数（小时）</label>
        <input type="number" id="hours" placeholder="请输入工作小时数" step="0.01">
    </div>

    <div class="btn-group">
        <button onclick="addDailyRecord()">添加当日记录</button>
        <button onclick="calcMonthlyTotal()">计算月度汇总</button>
        <button onclick="clearAllRecords()" style="background: #ff4d4f;">清空所有记录</button>
    </div>

    <div class="result">
        <div class="daily-list" id="dailyList">
            <!-- 每日记录会动态显示在这里 -->
            暂无每日记录，请先选择/创建账户并添加记录...
        </div>
        <div class="summary" id="monthlySummary">
            <!-- 月度汇总会动态显示在这里 -->
        </div>
    </div>
</div>

<script>
    // 固定时薪
    const hourlyWage = 80;
    // 全局账户相关数据
    let accountData = JSON.parse(localStorage.getItem('salaryCalculatorAccounts')) || {};
    let currentAccount = '';

    // ========== 账户管理核心函数 ==========
    // 初始化账户列表
    function initAccountList() {
        const selectEl = document.getElementById('accountSelect');
        // 清空原有选项
        selectEl.innerHTML = '<option value="">请选择账户</option>';
        // 获取所有账户名
        const accountNames = Object.keys(accountData);
        // 添加账户选项
        accountNames.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            selectEl.appendChild(option);
        });
        // 选中当前账户/默认账户
        const defaultAccount = localStorage.getItem('defaultSalaryAccount') || '';
        if (defaultAccount && accountNames.includes(defaultAccount)) {
            selectEl.value = defaultAccount;
            switchAccount(defaultAccount);
        }
    }

    // 切换账户
    function switchAccount(accountName) {
        if (!accountName) {
            currentAccount = '';
            // 清空记录显示
            document.getElementById('dailyList').innerHTML = '暂无每日记录，请先选择/创建账户并添加记录...';
            document.getElementById('monthlySummary').innerHTML = '';
            return;
        }
        currentAccount = accountName;
        // 初始化账户数据（如果不存在则创建空记录）
        if (!accountData[currentAccount]) {
            accountData[currentAccount] = [];
            saveAccountData();
        }
        // 渲染当前账户的记录
        renderDailyRecords();
    }

    // 创建新账户
    function addAccount() {
        const newAccountName = document.getElementById('newAccountName').value.trim();
        if (!newAccountName) {
            alert('⚠️ 请输入账户名称！');
            return;
        }
        if (accountData[newAccountName]) {
            alert(`⚠️ 账户「${newAccountName}」已存在！`);
            return;
        }
        // 添加新账户（空记录）
        accountData[newAccountName] = [];
        saveAccountData();
        // 刷新账户列表
        initAccountList();
        // 选中新账户
        document.getElementById('accountSelect').value = newAccountName;
        switchAccount(newAccountName);
        // 清空输入框
        document.getElementById('newAccountName').value = '';
        alert(`✅ 账户「${newAccountName}」创建成功！`);
    }

    // 删除账户
    function deleteAccount() {
        const accountName = document.getElementById('accountSelect').value;
        if (!accountName) {
            alert('⚠️ 请先选择要删除的账户！');
            return;
        }
        if (confirm(`❓ 确定要删除账户「${accountName}」吗？该账户下的所有记录将被永久删除！`)) {
            // 删除账户数据
            delete accountData[accountName];
            saveAccountData();
            // 如果删除的是默认账户，清空默认设置
            if (localStorage.getItem('defaultSalaryAccount') === accountName) {
                localStorage.removeItem('defaultSalaryAccount');
            }
            // 刷新账户列表
            initAccountList();
            // 清空当前账户
            currentAccount = '';
            alert(`✅ 账户「${accountName}」已删除！`);
        }
    }

    // 设置默认账户
    function setDefaultAccount() {
        const accountName = document.getElementById('accountSelect').value;
        if (!accountName) {
            alert('⚠️ 请先选择账户！');
            return;
        }
        localStorage.setItem('defaultSalaryAccount', accountName);
        alert(`✅ 账户「${accountName}」已设为默认账户！`);
    }

    // 保存账户数据到本地存储
    function saveAccountData() {
        localStorage.setItem('salaryCalculatorAccounts', JSON.stringify(accountData));
    }

    // ========== 原有功能适配多账户 ==========
    // 计算时间段差值（如19:00-24:00返回5）
    function calculateHourDiff(timeStr) {
        const timeReg = /(\d+):(\d+)-(\d+):(\d+)/;
        const match = timeStr.match(timeReg);
        if (!match) return 0;
        
        const startHour = parseInt(match[1]);
        const startMin = parseInt(match[2]);
        const endHour = parseInt(match[3]);
        const endMin = parseInt(match[4]);
        
        const startTotalMin = startHour * 60 + startMin;
        const endTotalMin = endHour * 60 + endMin;
        let diffMin = endTotalMin - startTotalMin;
        
        if (diffMin < 0) {
            diffMin += 24 * 60;
        }
        
        return parseFloat((diffMin / 60).toFixed(2));
    }

    // 识别文本并添加记录
    function recognizeAndAddRecord() {
        if (!currentAccount) {
            alert('⚠️ 请先选择/创建账户！');
            return;
        }
        const text = document.getElementById('recognizeText').value.trim();
        const date = document.getElementById('recognizeDate').value.trim() || '未填写日期';
        
        if (!text) {
            alert('⚠️ 请先粘贴待识别的文本内容！');
            return;
        }

        const gmvReg = /大屏GMV\s+(\d+\.?\d*)/;
        const gmvMatch = text.match(gmvReg);
        const total = gmvMatch ? parseFloat(gmvMatch[1]) : 0;

        const backReg = /退货金额\s+(\d+\.?\d*)/;
        const backMatch = text.match(backReg);
        const back = backMatch ? parseFloat(backMatch[1]) : 0;

        const hours = calculateHourDiff(text);

        if (total === 0 && back === 0 && hours === 0) {
            alert('⚠️ 未识别到有效数据，请检查文本格式！');
            return;
        }

        document.getElementById('date').value = date;
        document.getElementById('total').value = total;
        document.getElementById('back').value = back;
        document.getElementById('hours').value = hours;

        const realSale = total - back;
        const commission = realSale * 0.003 * 0.85;
        const hourlyTotal = hours * hourlyWage;
        const dailyWage = commission + hourlyTotal;

        const record = {
            date: date,
            realSale: realSale,
            commission: commission,
            hourlyTotal: hourlyTotal,
            dailyWage: dailyWage
        };

        accountData[currentAccount].push(record);
        saveAccountData();
        renderDailyRecords();

        document.getElementById('recognizeText').value = '';
        document.getElementById('recognizeDate').value = '';

        alert(`✅ 识别成功！
日期：${date}
销售金额：${total} 元
退货金额：${back} 元
工作小时：${hours} 小时
当日工资：${dailyWage.toFixed(2)} 元`);
    }

    // 添加当日工资记录
    function addDailyRecord() {
        if (!currentAccount) {
            alert('⚠️ 请先选择/创建账户！');
            return;
        }
        let date = document.getElementById('date').value.trim() || '未填写日期';
        let total = parseFloat(document.getElementById('total').value) || 0;
        let back = parseFloat(document.getElementById('back').value) || 0;
        let hours = parseFloat(document.getElementById('hours').value) || 0;
        
        let realSale = total - back;
        let commission = realSale * 0.003 * 0.85;
        let hourlyTotal = hours * hourlyWage;
        let dailyWage = commission + hourlyTotal;

        const record = {
            date: date,
            realSale: realSale,
            commission: commission,
            hourlyTotal: hourlyTotal,
            dailyWage: dailyWage
        };

        accountData[currentAccount].push(record);
        saveAccountData();
        renderDailyRecords();

        document.getElementById('total').value = '';
        document.getElementById('back').value = '';
        document.getElementById('hours').value = '';

        alert(`✅ ${date} 记录添加成功！`);
    }

    // 渲染每日记录列表
    function renderDailyRecords() {
        const dailyListEl = document.getElementById('dailyList');
        
        if (!currentAccount || accountData[currentAccount].length === 0) {
            dailyListEl.innerHTML = '暂无每日记录，请先添加记录...';
            return;
        }

        const dailyRecords = accountData[currentAccount];
        let html = '';
        dailyRecords.forEach((item, index) => {
            html += `
                <div class="daily-item">
                    <div>
                        <strong>${item.date}</strong> 
                        实际销售：${item.realSale.toFixed(2)}元 | 
                        提成：${item.commission.toFixed(2)}元 | 
                        时薪：${item.hourlyTotal.toFixed(2)}元
                    </div>
                    <div>当日工资：<span style="color: #e64340; font-weight: bold;">${item.dailyWage.toFixed(2)}元</span></div>
                    <button style="background:#ff4d4f;margin-left:10px;padding:4px 10px;font-size:14px;" onclick="deleteDailyRecord(${index})">删除</button>
                </div>
            `;
        });

        dailyListEl.innerHTML = html;
    }

    // 删除单条记录
    function deleteDailyRecord(index) {
        if (!currentAccount) return;
        if (confirm('确定要删除该条记录吗？')) {
            accountData[currentAccount].splice(index, 1);
            saveAccountData();
            renderDailyRecords();
            if (document.getElementById('monthlySummary').innerHTML.trim() !== '') {
                calcMonthlyTotal();
            }
        }
    }

    // 计算月度汇总
    function calcMonthlyTotal() {
        if (!currentAccount || accountData[currentAccount].length === 0) {
            alert('⚠️ 暂无每日记录，请先添加记录！');
            return;
        }

        const dailyRecords = accountData[currentAccount];
        let monthlyRealSale = 0;
        let monthlyCommission = 0;
        let monthlyHourlyTotal = 0;
        let monthlyTotalWage = 0;

        dailyRecords.forEach(item => {
            monthlyRealSale += item.realSale;
            monthlyCommission += item.commission;
            monthlyHourlyTotal += item.hourlyTotal;
            monthlyTotalWage += item.dailyWage;
        });

        const summaryEl = document.getElementById('monthlySummary');
        summaryEl.innerHTML = `
            月度汇总（账户：${currentAccount}）：<br>
            月度实际销售总额：${monthlyRealSale.toFixed(2)} 元 | 
            月度提成总额：${monthlyCommission.toFixed(2)} 元 | 
            月度时薪总额：${monthlyHourlyTotal.toFixed(2)} 元<br>
            <span style="color: #e64340; font-size: 18px;">月度总工资：${monthlyTotalWage.toFixed(2)} 元</span>
        `;
    }

    // 清空所有记录
    function clearAllRecords() {
        if (!currentAccount) {
            alert('⚠️ 请先选择/创建账户！');
            return;
        }
        if (confirm(`❓ 确定要清空账户「${currentAccount}」的所有每日记录吗？此操作不可恢复！`)) {
            accountData[currentAccount] = [];
            saveAccountData();
            renderDailyRecords();
            document.getElementById('monthlySummary').innerHTML = '';
            document.getElementById('date').value = '';
            document.getElementById('recognizeDate').value = '';
            document.getElementById('recognizeText').value = '';
            alert('✅ 所有记录已清空！');
        }
    }

    // ========== 页面初始化 ==========
    // 监听账户选择变化
    document.getElementById('accountSelect').addEventListener('change', function() {
        switchAccount(this.value);
    });
    // 初始化账户列表
    window.onload = initAccountList;
</script>
</body>
</html>
